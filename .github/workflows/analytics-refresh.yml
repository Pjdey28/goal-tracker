name: Analytics Refresh

on:
  schedule:
    - cron: '0 2 * * *' # daily at 02:00 UTC
  workflow_dispatch:

jobs:
  refresh_analytics:
    runs-on: ubuntu-latest
    steps:
      - name: Call analytics refresh endpoint
        env:
          SERVER_URL: ${{ secrets.SERVER_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          echo "Calling ${SERVER_URL}/api/admin/analytics/refresh"
          HTTP_CODE=$(curl -s -o /tmp/resp.txt -w "%{http_code}" -X POST "${SERVER_URL}/api/admin/analytics/refresh" -H "x-cron-secret: ${CRON_SECRET}" -H "Content-Type: application/json") || true
          echo "HTTP status: $HTTP_CODE"
          echo "Response body:" && cat /tmp/resp.txt || true
