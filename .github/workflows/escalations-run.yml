name: Escalations Runner

on:
  schedule:
    - cron: '*/30 * * * *' # every 30 minutes (UTC)
  workflow_dispatch:

jobs:
  run_escalations:
    runs-on: ubuntu-latest
    steps:
      - name: Call escalations run endpoint
        env:
          SERVER_URL: ${{ secrets.SERVER_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          echo "Calling ${SERVER_URL}/api/admin/escalations/run"
          HTTP_CODE=$(curl -s -o /tmp/resp.txt -w "%{http_code}" -X POST "${SERVER_URL}/api/admin/escalations/run" -H "x-cron-secret: ${CRON_SECRET}" -H "Content-Type: application/json") || true
          echo "HTTP status: $HTTP_CODE"
          echo "Response body:" && cat /tmp/resp.txt || true
