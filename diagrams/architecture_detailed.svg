<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1100" viewBox="0 0 1400 1100">
  <style>
    .box { fill:#ffffff; stroke:#1f2937; stroke-width:2; rx:10; }
    .title { font: 16px/1.2 Arial, sans-serif; fill:#0f172a; font-weight:700 }
    .text { font: 13px/1.2 Arial, sans-serif; fill:#0f172a }
    .arrow { stroke:#0f172a; stroke-width:2; fill:none; marker-end:url(#arrowhead); }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0f172a" />
    </marker>
  </defs>

  <!-- Client side -->
  <rect class="box" x="40" y="40" width="300" height="120" />
  <text x="60" y="75" class="title">Client / Users</text>
  <text x="60" y="100" class="text">Browser (React SPA)</text>
  <text x="60" y="120" class="text">Vercel CDN / Edge</text>

  <!-- Edge / Load Balancer -->
  <rect class="box" x="380" y="140" width="260" height="80" />
  <text x="400" y="170" class="title">Edge / CDN</text>
  <text x="400" y="190" class="text">Global LB / CDN</text>

  <!-- Frontend -->
  <rect class="box" x="680" y="140" width="320" height="100" />
  <text x="700" y="175" class="title">Vercel</text>
  <text x="700" y="200" class="text">React (Vite) SPA</text>

  <!-- Backend -->
  <rect class="box" x="1080" y="140" width="260" height="180" />
  <text x="1100" y="175" class="title">Render</text>
  <text x="1100" y="200" class="text">Node / Express API</text>
  <text x="1100" y="220" class="text">Auth, Goals, Admin</text>

  <!-- Backend internal boxes -->
  <rect class="box" x="1080" y="380" width="260" height="140" />
  <text x="1100" y="410" class="title">Backend Integrations</text>
  <text x="1100" y="435" class="text">Azure AD (OIDC)</text>
  <text x="1100" y="455" class="text">SendGrid / SMTP</text>

  <!-- Database -->
  <rect class="box" x="40" y="400" width="350" height="160" />
  <text x="60" y="435" class="title">Data Layer</text>
  <text x="60" y="460" class="text">Postgres (users, goals, checkins)</text>
  <text x="60" y="480" class="text">Materialized Views (analytics)</text>
  <text x="60" y="500" class="text">Escalation &amp; Audit logs</text>

  <!-- Workers / Scheduler -->
  <rect class="box" x="420" y="480" width="380" height="140" />
  <text x="440" y="515" class="title">Automation / Workers</text>
  <text x="440" y="540" class="text">GitHub Actions / Render Cron</text>
  <text x="440" y="560" class="text">Background workers (optional)</text>

  <!-- Observability & Secrets -->
  <rect class="box" x="420" y="660" width="380" height="120" />
  <text x="440" y="695" class="title">Ops &amp; Security</text>
  <text x="440" y="720" class="text">Monitoring / Logs</text>
  <text x="440" y="740" class="text">Secrets Store (Render/Vercel/GitHub)</text>

  <!-- Arrows -->
  <path class="arrow" d="M340 200 L380 200" marker-end="url(#arrowhead)" />
  <text x="360" y="190" class="text">Static assets / SPA</text>

  <path class="arrow" d="M540 200 L680 180" marker-end="url(#arrowhead)" />
  <text x="600" y="170" class="text">Edge → Frontend</text>

  <path class="arrow" d="M1000 180 L1080 180" marker-end="url(#arrowhead)" />
  <text x="1040" y="170" class="text">API requests</text>

  <path class="arrow" d="M1140 290 L1140 380" marker-end="url(#arrowhead)" />
  <text x="1160" y="335" class="text">Integrations</text>

  <path class="arrow" d="M400 480 L420 480" marker-end="url(#arrowhead)" />
  <text x="410" y="470" class="text">Scheduler triggers</text>

  <path class="arrow" d="M440 520 L440 580" marker-end="url(#arrowhead)" />
  <text x="460" y="550" class="text">Workers → API</text>

  <path class="arrow" d="M340 420 L420 420" marker-end="url(#arrowhead)" />
  <text x="360" y="410" class="text">API Read/Write</text>

  <path class="arrow" d="M420 580 L420 660" marker-end="url(#arrowhead)" />
  <text x="430" y="620" class="text">Monitoring / Secrets</text>

  <!-- Footer note -->
  <text x="40" y="920" class="text">Diagram: Vercel (frontend) serves SPA; requests route via edge to Render API; API interacts with Postgres, materialized views, integrations; schedulers trigger admin endpoints; monitoring and secrets stored separately.</text>

</svg>
